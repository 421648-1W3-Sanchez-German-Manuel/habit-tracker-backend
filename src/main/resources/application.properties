spring.application.name=habit-tracker-api
server.port=8080

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://root:rootpassword@localhost:27018/habitdb?authSource=admin}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/habit_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

app.seed.enabled=${APP_SEED_ENABLED:true}

app.jwt.secret=${APP_JWT_SECRET:change-this-secret-key-change-this-secret-key}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

app.ollama.base-url=${APP_OLLAMA_BASE_URL:http://localhost:11434}
app.ollama.connect-timeout-ms=${APP_OLLAMA_CONNECT_TIMEOUT_MS:2000}
app.ollama.read-timeout-ms=${APP_OLLAMA_READ_TIMEOUT_MS:10000}

app.habit-similarity.similarity-threshold=${APP_HABIT_SIMILARITY_THRESHOLD:0.8}
